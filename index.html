<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Task Manager</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }\n        .container { width: 80%; margin: auto; }\n        header { background: #007BFF; color: #fff; padding: 10px 0; text-align: center; }\n        .action-form { margin: 20px 0; }\n        .category { margin-bottom: 15px; border: 1px solid #ccc; padding: 10px; }\n        .action { margin: 5px 0; }\n        button { background: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; }\n        button:hover { background: #218838; }\n    </style>\n</head>\n<body>\n<header>\n    <h1>Task Manager</h1>\n</header>\n<div class="container">\n    <div class="action-form">\n        <input type="text" id="actionTitle" placeholder="Enter action title">\n        <input type="text" id="actionCategory" placeholder="Enter action category">\n        <button id="addAction">Add Action</button>\n    </div>\n    <div id="categories"></div>\n</div>\n<script>\n    const addActionButton = document.getElementById('addAction');\n    const actionTitleInput = document.getElementById('actionTitle');\n    const actionCategoryInput = document.getElementById('actionCategory');\n    const categoriesDiv = document.getElementById('categories');\n    let actions = JSON.parse(localStorage.getItem('actions')) || {};\n\n    function displayActions() {\n        categoriesDiv.innerHTML = '';\n        for (const category in actions) {\n            const div = document.createElement('div');\n            div.classList.add('category');\n            div.innerHTML = `<h3>${category}</h3>`;\n            actions[category].forEach((action, index) => {\n                div.innerHTML += `<div class='action'>${action} <button onclick='deleteAction(\"${category}\", ${index}\")'>Delete</button></div>`;\n            });\n            categoriesDiv.appendChild(div);\n        }\n    }\n\n    function deleteAction(category, index) {\n        actions[category].splice(index, 1);\n        if (actions[category].length === 0) {\n            delete actions[category];\n        }\n        localStorage.setItem('actions', JSON.stringify(actions));\n        displayActions();\n    }\n\n    addActionButton.addEventListener('click', () => {\n        const title = actionTitleInput.value.trim();\n        const category = actionCategoryInput.value.trim();\n        if (title && category) {\n            if (!actions[category]) {\n                actions[category] = [];\n            }\n            actions[category].push(title);\n            localStorage.setItem('actions', JSON.stringify(actions));\n            actionTitleInput.value = '';\n            actionCategoryInput.value = '';\n            displayActions();\n        } else {\n            alert('Please enter both title and category.');\n        }\n    });\n\n    displayActions();\n</script>\n</body>\n</html>
