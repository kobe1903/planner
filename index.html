<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Planner</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body class="dark-mode">
    <header>
        <h1>Planner</h1>
        <button class="toggle-theme">Toggle Theme</button>
    </header>
    <main>
        <section class="note-taking">
            <h2>Add Note</h2>
            <form>
                <input type="text" placeholder="Action" required>
                <input type="text" placeholder="Description" required>
                <input type="text" placeholder="Category" required>
                <button type="submit" class="rounded-btn">Add Note</button>
            </form>
        </section>
        <section class="notes-table">
            <h2>Notes</h2>
            <table>
                <thead>
                    <tr>
                        <th>Action</th>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Dynamic content goes here -->
                </tbody>
            </table>
        </section>
        <section class="google-calendar-integration">
            <h2>Google Calendar Integration</h2>
            <button class="rounded-btn">Integrate with Google Calendar</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Planner App</p>
    </footer>
</body>
</html>
