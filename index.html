<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action Planner</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #f5f7fa, #c3cfe2); }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #333; }
        .action-item { background: #fff; border-radius: 5px; margin: 10px 0; padding: 15px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .category { display: inline-block; padding: 5px; border-radius: 3px; margin-right: 5px; }
        .delete-btn { color: red; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Action Planner</h1>
        <form id="plannerForm">
            <input type="text" id="title" placeholder="Title" required />
            <textarea id="description" placeholder="Description" required></textarea>
            <select id="category">
                <option value="Work">Work</option>
                <option value="Personal">Personal</option>
                <option value="Health">Health</option>
                <option value="Learning">Learning</option>
                <option value="Projects">Projects</option>
                <option value="Shopping">Shopping</option>
                <option value="Other">Other</option>
            </select>
            <select id="priority">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
            <button type="submit">Add Action</button>
        </form>
        <div id="actionList"></div>
    </div>
    <script>
        const actionForm = document.getElementById('plannerForm');
        const actionList = document.getElementById('actionList');
        let actions = JSON.parse(localStorage.getItem('actions')) || [];

        function renderActions() {
            actionList.innerHTML = '';
            actions.forEach((action, index) => {
                const actionItem = document.createElement('div');
                actionItem.className = 'action-item';
                actionItem.innerHTML = `
                    <h3>${action.title}</h3>
                    <p>${action.description}</p>
                    <span class='category'>${action.category}</span>
                    <span>${action.priority}</span>
                    <button class='delete-btn' data-index='${index}'>Delete</button>
                `;
                actionList.appendChild(actionItem);
            });
        }

        actionForm.addEventListener('submit', (event) => {
            event.preventDefault();
            const newAction = {
                title: actionForm.title.value,
                description: actionForm.description.value,
                category: actionForm.category.value,
                priority: actionForm.priority.value,
                timestamp: new Date().toISOString()
            };
            actions.push(newAction);
            localStorage.setItem('actions', JSON.stringify(actions));
            renderActions();
            actionForm.reset();
        });

        actionList.addEventListener('click', (event) => {
            if (event.target.classList.contains('delete-btn')) {
                const index = event.target.dataset.index;
                if (confirm('Are you sure you want to delete this action?')) {
                    actions.splice(index, 1);
                    localStorage.setItem('actions', JSON.stringify(actions));
                    renderActions();
                }
            }
        });

        window.addEventListener('load', renderActions);
    </script>
</body>
</html>
