<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <title>Dark Mode Planner</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #121212;
            color: white;
        }
        button {
            background-color: #6200ea;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border: 1px solid #333;
        }
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1; 
            left: 0; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            background-color: rgb(0,0,0); 
            background-color: rgba(0,0,0,0.4); 
        }
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto; 
            padding: 20px;
            border: 1px solid #888;
            width: 80%; 
        }
    </style>
</head>
<body>

    <h1>Planner App</h1>

    <section>
        <h2>Actions</h2>
        <button id="addActionBtn">Add Action</button>
        <ul id="actionList"></ul>
    </section>

    <section>
        <h2>Notes</h2>
        <table id="notesTable">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Content</th>
                    <th>Category</th>
                </tr>
            </thead>
            <tbody>
                <!-- Notes will be populated here -->
            </tbody>
        </table>
        <button id="addNoteBtn">Add Note</button>
    </section>

    <section>
        <h2>Calendar</h2>
        <div id="calendar"></div>
    </section>

    <!-- Modal for adding action -->
    <div id="actionModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Add Action</h2>
            <input type="text" id="actionInput" placeholder="Action Description">
            <button id="saveActionBtn">Save Action</button>
        </div>
    </div>

    <script>
        // JavaScript for modal and functionality goes here
        document.getElementById('addActionBtn').onclick = function() {
            document.getElementById('actionModal').style.display = "block";
        }
        document.getElementsByClassName("close")[0].onclick = function() {
            document.getElementById('actionModal').style.display = "none";
        }
        // Additional JavaScript for notes and calendar integration
    </script>
</body>
</html>
